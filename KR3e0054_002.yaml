body:
  text: 蘭室祕藏卷中元李杲撰頭痛門頭痛論金匱真言論云東風生於春病在肝俞在頸項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上額交巔上入絡腦還出别下項病衝頭痛又足少陽膽之脈起於目鋭眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其隂陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者病在耳中過在手巨陽少隂乃濕熱頭痛也如氣上不下頭痛癲疾者下虛上實也過在足少隂巨陽甚則入腎寒濕頭痛也如頭半寒痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則腦盡痛手足寒至節死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛凡頭痛每以風藥治之者總其大體而言之也髙巔之上惟風可到故味之薄者隂中之陽乃自地升天者也然亦有三隂三陽之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之類為主少陽經頭痛脈弦細往來寒熱柴胡為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根白芷為主太隂頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼术半夏南星為主少隂經頭痛三隂三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛為主厥隂頭項痛或吐痰沫厥冷其脈浮緩吳茱茰湯主之血虛頭痛當歸川芎為主氣虛頭痛人參黃茋為主氣血俱虛頭痛調中益氣湯少加川芎蔓荆子細辛其效如神白术半夏天麻湯治痰厥頭痛藥也青空膏乃風濕熱頭痛藥也羌活附子湯治厥隂頭痛藥也如濕氣在頭者以苦吐之不可執方而治先師嘗病頭痛發時兩頰青黃暈眩目不欲閉懶言身體沉重兀兀欲吐潔古曰此厥隂太隂合病名曰風痰以局方玉壺丸治之更灸俠溪穴即愈是知方者體也法者用也徒執體而不知用者弊體用不失可謂上工矣清空膏治偏正頭痛年深不愈者善療風濕熱頭上壅損目及腦痛不止川芎五錢柴胡七錢黃連炒防風去蘆羌活已上各一兩炙甘草細挺子黃芩三兩去皮銼一半酒製一半炒右為細末每服二錢已熱盞內入茶少許湯調如膏抹在口內少用白湯送下臨卧如苦頭痛每服加細辛二分如太隂脈緩有痰名曰痰厥頭痛減羌活防風川芎甘草加半夏一兩五錢如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡熱而渴此陽明頭痛只與白虎湯加好吳白芷徹清膏蔓荆子細辛已上各一分薄荷葉川芎已上各三分生甘草熟甘草已上各五分藁本一錢右為細末每服二錢食後茶清調下川芎散治頭目不清利川芎三分柴胡七分羌活防風藁本生甘草升麻已上各一錢熟甘草酒生地黃各二錢酒黃連炒酒黃芩已上各四錢五分右為細末每服一錢或二三錢食後茶清調下忌酒濕麵白芷散一名鬱金散治頭痛鬱金一錢香白芷石膏已上各二錢薄荷葉芒硝已上各三錢右為極細末口含水鼻內嗅之碧雲散治頭痛細辛鬱金芒硝已上各一錢蔓荆子川芎已上各一錢二分石膏一錢三分青黛一錢五分薄荷葉二錢紅豆一箇右為極細末口含水鼻內嗅之羌活清空膏蔓荆子一錢黃連三錢羌活防風甘草已上各四錢黃芩一兩右為細末每服一錢茶清調下食後臨卧清上瀉火湯昔有人年少時氣弱常於氣海三里穴灸之節次約五七十壯至年老添熱厥頭痛雖冬天大寒猶喜寒風其頭痛則愈微來暖處或見煙火其痛復作五七年不愈皆灸之過也荆芥穗川芎已上各二分蔓荆子當歸身蒼术已上各三分酒黃連生地黃藁本甘草已上各五分升麻防風已上各七分酒黃蘖炙甘草黃茋已上各一錢酒黃芩酒知母已上各一錢五分羌活三錢柴胡五錢細辛少許紅花少許右銼如麻豆大分作二服每服水二盞煎至一盞去柤稍熱服食後補氣湯服前藥之後服此藥柴胡二分升麻三分黃茋八分當歸身二錢炙甘草四錢紅花少許右㕮咀作二服水二盞煎至一盞去柤稍熱服食後細辛散治偏正頭痛細辛瓦粉已上各二分生黃芩芍藥已上各五分酒黃連川芎已上各七分炒黃芩酒黃芩已上各一錢炙甘草一錢五分柴胡二錢右為粗末每服三錢水一大盞半煎至一盞取清食後服之羌活湯治風熱壅盛上攻頭目昏眩炙甘草七分澤瀉三錢酒洗瓜蔞根白茯苓酒黃蘗各五錢柴胡七錢防風細黃芩酒洗酒黃連羌活已上各一兩右為粗末每服五錢重水二中盞煎至一盞取清食後臨卧通口熱服之養神湯治精神短不得睡項筋腫急難伸禁甘溫宜苦味木香橘皮柴胡已上各一分酒黃芩二分人參黃蘗白术川芎已上各三分升麻四分蒼术麥蘖麵當歸身黃連已上各五分甘草半夏已上各七分黃茋一錢右㕮咀每服五錢水二大盞煎至一盞去柤稍熱服不拘時候安神湯治頭痛頭旋眼黑生甘草炙甘草已上各二錢防風二錢五分柴胡升麻酒生地黃酒知母已上各五錢酒黃蘗羌活已上各一兩黃茋二兩右為粗末每服五錢水二大盞半煎至一盞半加蔓荆子五分川芎三分再煎至一盞去柤臨卧熱服半夏白术天麻湯范天騋之內有脾胃證時顯煩燥胸中不利大便不通而又為寒氣怫鬱悶亂大作火不伸故也疑其有熱服踈風丸大便行其病不減恐其藥少再服七八十丸大便復見兩行元證不瘳增以吐逆食不能停痰唾稠粘湧出不止眼黑頭旋惡心煩悶氣短促上喘無力以言心神顛倒目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安卧余料前證是胃氣已損復下兩次則重虛其胃而痰厥頭痛作矣與此藥而治之黃蘗二分酒洗乾薑三分澤瀉白茯苓天麻黃茋人參蒼术已上各五分炒神麴白术已上各一錢麥蘖麵半夏湯洗橘皮已上各一錢五分右㕮咀每服五錢水二大盞煎至一盞去柤熱服食前一服而愈此頭痛苦甚謂之足太隂痰厥頭痛非半夏不能療眼黑頭旋風虛內作非天麻不能除黃茋甘溫瀉火補中益氣二术俱苦甘溫除濕補中益氣澤瀉茯苓利小便𨗳濕橘皮苦溫益氣調中升陽神麴消食蕩胃中滯氣大麥麵寬中助胃氣乾薑辛熱以滌中寒黃蘗大苦寒酒洗以療冬天少火在泉發躁也口齒咽喉門口齒論論曰夫齒者腎之標口者脾之覆諸經多有會於口者其牙齒是手足陽明之所過上齦𨽻於坤土乃足陽明胃之脈貫絡也止而不動下齦嚼物動而不休手陽明大腸之脈所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱其病不一牙者腎之標亦喜寒寒者堅牢為病不同熱甚則齒動齦斷袒脫作痛不已故所治療不同也有惡熱而作痛者有惡寒而作痛者有惡寒惡熱而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒欲多而作痛者有牙齒動搖而作痛者有齒齦腫起為痛者有脾胃中有風邪但覺風而作痛者又有牙上多為蟲所蝕其齒缺少而色變為蟲牙痛者有胃中氣定不能於寒袒露其齒作痛者有牙齒疼痛而穢臭之氣不可近者痛既不一豈可一藥而盡之哉羌活散治客寒犯腦風寒濕腦痛項筋急牙齒動搖肉齦袒脫疼痛藁本香白芷桂枝已上各三錢蒼术升麻已上各五錢當歸身六錢草豆蔲仁一錢羌活一錢五分羊脛骨灰二錢麻黃去根節防風已上各三錢柴胡五錢細辛少許右為細末先用溫水潄口淨擦之其痛立止也草豆蔲散治寒多熱少牙齒疼痛細辛葉防風已上各二分羊脛骨灰熟地黃已上各五分當歸六分草豆蔲仁黃連已上各一錢三分升麻二錢五分右為細末同前牙痛處擦之麻黃散治冬寒時分寒濕腦痛項筋急牙齒動搖疼痛防風藁本已上各三分羊脛骨灰當歸身熟地黃已上各六分草豆蔲仁升麻黃連已上各一錢羌活一錢五分麻黃不去節草龍膽酒洗生地黃已上各二錢細辛右為細末依前藥法擦之麝香散治熱多寒少牙露根肉齦脫血出齒動欲落疼痛妨食忤涼少忤熱多熟地黃一分益智仁二分半當歸身生地黃麻黃根酒漢防己人參已上各三分升麻一錢草豆蔲黃連已上各一錢五分羊脛骨灰二錢麝香少許右為細末如前藥擦之治蟲散一名白芷散治大寒犯腦牙齒疼痛及蟲痛胃經濕熱腫痛桂枝一分熟地黃二分藁本白芷已上各三分當歸身益智仁黃連已上各四分羌活五分吳茱茰八分草豆蔲黃茋升麻已上各一錢羊脛骨灰二錢麻黃不去節二錢五分右為細末同前擦之益智木律散治寒熱牙痛木律二分當歸黃連已上各四分羊脛骨灰益智皮熟地黃已上各五分草豆蔲皮一錢二分升麻一錢五分右為細末用度如前擦之如寒牙痛不用木律蠍梢散治大寒風犯腦牙痛白芷當歸身柴胡已上各二分桂枝升麻防風藁本黃茋已上各三分羌活五分草豆蔲皮一錢麻黃去節一錢五分羊脛骨灰二錢五分蠍梢少許右為細末如前法用之白牙散白芷七分升麻一錢石膏一錢五分羊脛骨灰二錢麝香少許右為細末先用溫水潄口擦之妙刷牙藥麝香生地黃酒防己熟地黃已上各二分當歸身人參已上各三分草豆蔲皮五分升麻一錢羊脛骨灰黃連已上各二錢白豆蔲草豆蔲已上各三錢沒石子三箇五倍子一箇右為極細末如前法擦之妙獨聖散治一切牙痛風疳北地蒺藜不拘多少陰乾右為細末每用刷牙以熱漿水潄牙外粗末熱漿水刷牙大有神效不可具述當歸龍膽散治寒熱停牙痛香白芷當歸梢羊脛骨灰生地黃已上各五分麻黃草豆蔲皮草龍膽升麻黃連已上各一錢右為細末如前法擦之神效牢牙地黃散治腦寒痛及牙痛藁本二分生地黃熟地黃羌活防己人參已上各三分當歸身益智仁已上各四分香白芷黃茋已上各五分羊脛骨灰吳茱萸黃連麻黃已上各一錢草豆蔲皮一錢一分升麻一錢五分右為細末如前法擦之細辛散治寒邪風邪犯腦牙齒痛柴胡防風升麻白芷已上各二分桂枝二分半麻黃去節藁本蒼术已上各三分當歸身四分草豆蔲五分羊脛骨灰羌活已上各一錢五分細辛少許右為細末先嗽後擦之佳立效散治牙齒痛不可忍及頭腦項背微惡寒飲大惡熱飲其脈上中下三部陽虛隂盛是五臟內盛六腑陽道脈微小小便滑數細辛二分炙甘草三分升麻十分防風一錢草龍膽酒洗四錢右㕮咀都作一服水一盞煎至七分去柤以匙抄在口內煠痛處待少時則止如多惡熱飲更加草龍膽一錢此法不定隨寒熱多少臨時加減若更惡風作痛加草豆蔲黃連已上各五分勿加草龍膽牢牙散治牙齦肉綻有根牙疳腫痛牙動搖欲落牙齒不長牙黃口臭羌活一兩草龍膽酒洗一兩五錢羊脛骨灰二兩升麻四兩右為細末以紗羅子羅骨灰作微塵末和勻卧時貼在牙齦上清胃散治因服補胃熱藥致使上下牙疼痛不可忍牽引頭腦滿面發熱大痛足陽明之别絡入腦喜寒惡熱乃是手陽明經中熱盛而作也其齒喜冷惡熱當歸身擇細黃連如連不好更加二分夏月倍之生地黃酒製已上各三分牡丹皮五分升麻一錢右為細末都作一服水一盞半煎至一盞去柤帶冷服之神功丸治多食肉人口臭不可近牙齒疳蝕牙齦肉將脫牙齒落血不止蘭香葉如無藿香代之當歸身藿香用葉木香已上各一錢升麻二錢生地黃酒洗生甘草已上各三錢黃連去鬚揀淨酒洗稱縮砂仁已上各五錢右同為細末湯浸􅔻餅為丸如菉豆大每服一百丸或加至二百丸止白湯食逺服兼治血痢及血崩及血下不止血下褐色或紫黑色及腸澼下血空心服米湯下其脈洪大而緩者及治麻木厥氣上衝逆氣上行妄聞妄見者桔梗湯治咽腫微覺痛聲破當歸身馬勃已上各一分白殭蠶黃芩已上各三分麻黃五分去節桔梗甘草已上