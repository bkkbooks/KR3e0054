猶寒冷不任寒之極也面白如枯魚之象肌肉如刀剖削瘦峻之速也小便不止與白帶長流而不禁固自不知覺面白目青藍如菜色目䀮䀮無所見身重如山行步欹側不能安地腿膝枯細大便難祕口不能言無力之極食不下心下痞煩心懊憹不任其苦面停垢背惡寒小便遺而不知此上中下三陽真氣俱虛欲竭噦嘔不止胃虛之極也脈沈厥緊而澀按之空虛若脈洪大而澀按之無力猶為中寒之證沉按之空虛者乎按之不鼓是為隂寒乃氣血俱虛之極也茴香五錢黑附子炮製去皮臍良薑已上各七錢當歸一兩右四味銼如麻豆大以上等好酒一升半同煮至酒盡焙乾炙甘草苦練生用丁香已上各五錢木香升麻已上各一錢柴胡二錢炒黃鹽全蝎已上各三錢延胡索四錢右與前四味藥同為細末酒煮麵糊為丸如梧桐子大每服五七十丸空心淡醋湯下忌油膩冷物酒濕麵固真丸治白帶久下不止臍腹冷痛隂中亦然目中溜火視物䀮䀮然無所見齒皆惡熱飲痛須得黃連細末擦之乃止惟喜乾食大惡湯飲此病皆寒濕乘其胞內故喜乾而惡濕肝脛隂火上溢走於標故上壅而目中溜火腎水侵肝而上溢致目䀮䀮而無所見齒惡熱飲者是陽明經中伏火也治法當大瀉寒濕以丸藥治之故曰寒在下焦治宜緩大忌湯散以酒製白石脂白龍骨以枯其濕炮乾薑大熱辛瀉寒水以黃蘖之大寒為因用又為鄉𨗳故云古者雖有重罪不絶人之後又為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥五分𨗳之恐辛熱之藥太甚損其肝經故微瀉之以當歸身之辛溫大和其血脈此用藥之法備矣黃蘗酒洗白芍藥已上各五分柴胡白石脂已上各一錢火燒赤水飛細研日乾白龍骨酒煮日乾水飛為末當歸酒洗已上各一錢乾薑四錢炮右件除龍骨白石脂水飛研外同為細末水煮麵糊為丸如雞頭仁大日乾空心多用白沸湯下無令胃中停滯待少時以早飯壓之是不令熱藥犯胃忌生冷硬物酒濕麵烏藥湯治婦人血海疼痛當歸甘草木香已上各五錢烏藥一兩香附子二兩炒右㕮咀每服五錢水一大盞去柤溫服食前助陽湯治白帶下隂户中痛空心而急痛身黃皮緩身重如山隂中如水生黃芩橘皮已上各五分防風高良薑乾薑郁李仁甘草已上各一錢柴胡一錢三分白葵花七朵右銼如麻豆大分作二服每服水二大盞煎至一盞去柤食前稍熱服水府丹治婦人久虛積冷經候不行癥瘕癖塊腹中暴痛面有皯􅍍黧黑羸瘠硇砂紙隔沸湯淋熬取紅豆已上各五錢桂心另為末木香乾薑已上各一兩砂仁二兩經煆花蘂石研一兩五錢班貓一百箇去頭翅生地黃汁童子小便各一升臘月狗膽七枚芫蜻三百箇去頭足糯米一升炒黃去米右九味為細末同三汁熬為膏和丸如雞頭大硃砂為衣每服溫酒細嚼食前服米飲亦可孕婦不可服丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經隔少時其脈二尺俱弦緊洪按之無力其證自覺臍下如氷求厚衣被以禦其寒白帶白滑之物多間有如屋漏水下時有鮮血右尺脈時微洪也熟地黃白芍藥已上各三分川芎丁香已上各四分阿膠六分生艾葉一錢當歸一錢二分右川芎為細末當歸酒洗銼熟地黃丁香為細末艾亦銼都作一服水五大盞先煎五味作一盞零二分去柤入膠再上火煎至一大盞帶熱空心服之黃茋當歸人參湯丁未仲冬郭大方來説其妻經水暴崩不止先曾損身失血自後一次縮一十日而來今次不止其人心窄性急多驚以豫料之必因心氣不足飲食不節得之大方曰無到彼診得掌中寒脈沉細而緩間而沉數九竅微有不利四肢無力上喘氣短促口鼻氣皆不調果有心氣不足脾胃虛弱之證胃脘當心而痛左脅下縮急有積當臍有動氣腹中鳴下氣大便難虛證極多不能盡録擬先治其本餘證可以皆去安心定志鎮墜其驚調和脾胃大益元氣補其血脈令養其神以大熱之劑去其冬寒凝在皮膚內少加生地黃去命門相火不令四肢痿弱黃連一分生地黃三分炒神麯橘皮桂枝已上各五分草豆蔲仁六分黃茋人參麻黃不去節已上各一錢當歸身一錢五分杏仁五箇另研如泥右㕮咀作二服水二大盞半煎麻黃令沸去沫煎至二盞入諸藥同煎至一大盞於已午之間食消盡服之一服立止其胃脘痛乃胃上有客寒與大熱藥草豆蔲丸一十五丸白湯送下其痛立止再與肝之積藥除其積之根源而愈當歸芍藥湯治婦人經脈漏下不止其色鮮紅時值七月處暑之間先因勞役脾胃虛弱氣短氣逆自汗不止身熱悶亂惡見飲食非惟不入亦不思食沈懶困倦四肢無力大便時泄後再因心氣不足經脈再下不止惟覺氣下脫其元氣逆上全無惟覺心腹中氣下行氣短少不能言是無力以言非懶語也此藥主之柴胡二分炙甘草生地黃已上各三分橘皮不去白熟地黃各五分黃茋一錢五分蒼术泔浸去皮當歸身白芍藥白术已上各二錢右十味㕮咀如麻豆大分作二服水二盞半煎至一盞去柤稍熱空心服之柴胡調經湯治經水不止鮮紅項筋急腦痛脊骨強痛炙甘草當歸身葛根已上各三分獨活藁本升麻已上各五分柴胡七分羌活蒼术已上各一錢紅花少許右銼如麻豆大都作一服水四大盞煎至一盞去柤空心稍熱服取微汗立止一婦人經候凝結黑血成塊左廂有血瘕水泄不止穀有時不化後血塊暴下并水俱作是前後二隂有形血脫竭於下既久經候猶不調水泄日見三兩行食罷煩心飲食減少甚至瘦弱東垣老人曰夫聖人治病必本四時升降浮沉之理權變之宜必先歲氣無伐天和無勝無虛遺人夭殃無致邪無失正絶人長命故仲景云陽盛隂虛下之則愈汗之則死隂盛陽虛汗之即愈下之即死大抵聖人立法且如升陽或發散之劑是助春夏之陽氣令其上升乃瀉秋冬收藏殞殺寒涼之氣此病是也當用此法治之升陽浮沈之至理也天地之氣以升降浮沈乃從四時如治病不可逆之故經云順天則昌逆天則亡可不畏哉夫人之身亦有四時天地之氣不可止認在外人亦體同天地也今經漏不止是前隂之氣血已脫下矣水泄又數年是後隂之氣血下陷以脫矣後隂者主有形之物也前隂者精氣之户下竭是病人周身之血氣常行秋冬之令隂主殺此等收藏之病是也陽生隂長春夏是也在人之身令氣升浮者榖氣上行是也既病人周身血氣皆不生長榖氣又不勝其肌肉消少是兩儀之氣俱將絶矣既下元二隂俱脫血氣將竭假令當是熱證今下焦久脫化為寒矣此病久沉久降寒濕大勝當急救之㵼寒以熱除濕以燥大勝大舉以助生長補養氣血不致偏竭聖人立治之法既濕氣大勝以所勝治之助甲風木上升是也故經云風勝濕是以所勝平之也當先調和胃氣次用白术之類以燥其濕而滋元氣如其不止後用風藥以勝濕此便是大舉大升以助春夏一濕之久陷下之至治也益胃升陽湯血脫益氣古聖人之法也先補胃氣以助生發之氣故曰陽生隂長諸甘藥為之先務舉世皆以為補殊不知甘能生血此陽生隂長之理也故先理胃氣人之身內榖氣為寶柴胡升麻已上各五分炙甘草當歸身酒洗陳皮已上各一錢人參去蘆有嗽去之炒神麯已上各一錢五分黃茋二錢白术三錢生黃芩少許右㕮咀每服一錢水二大盞煎至一盞去柤稍熱服如腹中痛每服加白芍藥三分中桂少許如渴或口乾加葛根二分不拘時候升陽舉經湯治經水不止如右尺脈按之空虛是氣血俱脫大寒之證輕手其脈數疾舉指弦緊或澀皆陽脫之證隂火亦亡見熱證於口鼻眼或渴此皆隂躁陽欲先去也當溫之舉之升之浮之燥之此法當大升浮血氣切補命門之下脫也肉桂去皮盛夏勿用秋冬用白芍藥紅花已上各五分細辛六分人參去蘆熟地黃川芎已上各一錢獨活根黑附子炮製去皮臍炙甘草已上各一錢五分羌活藁本防風已上各二錢白术當歸黃茋已上各三錢桃仁十箇湯浸去皮尖細研右㕮咀每服三錢若病勢順當漸加至五錢每服水三盞煎至一盞空心熱服半産誤用寒涼之藥論婦人分娩及半産漏下昏冒不省瞑目無所知覺蓋因血暴亡有形血去則心神無所養心與包絡者君火相火也得血則安亡血則危火上熾故令人昏冒火勝其肺瞑目不省人事是隂血暴去不能鎮撫也血已虧損往往用滑石甘草石膏之類乃辛甘大寒之藥能㵼氣中之熱是血虧瀉氣乃隂虧瀉陽使二者俱傷反為不足虛勞之病昏迷不省者上焦心肺之熱也此無形之熱用寒涼之藥驅令下行豈不知上焦之病悉屬於表乃隂證也汗之則愈今反下之幸而不死暴虧氣血生命豈能久活又不知內經有説病氣不足宜補不宜瀉但暝目之病悉屬於隂宜汗不宜下又不知傷寒鬱冒得汗則愈是禁用寒涼藥也分娩半産本氣不病是暴去其血亡血補血又何疑焉補其血則神昌常時血下降亡今當補而升舉之心得血而養神不昏矣血若暴下是秋冬之令大旺今舉而升之以助其陽則目張神不昏迷矣今立一方補血養血生血益陽以補手足厥隂之不足也全生活血湯紅花三分蔓荆子細辛已上各五分生地黃夏月多加之熟地黃已上各一錢藁本川芎已上各一錢五分防風諸陽既陷何以知之血下脫便是羌活獨活炙甘草柴胡去蘆當歸身酒洗葛根已上各二錢白芍藥升麻已上各三錢右㕮咀每服五錢水二盞煎至一盞去柤食前稍熱服當歸附子湯治臍下冷痛赤白帶下當歸二分炒鹽三分蝎稍升麻已上各五分甘草六分柴胡六分黃蘗少許為引用附子一錢乾薑良薑各一錢右為粗末每服五錢水五盞煎至一盞去柤稍熱服或為細末酒麵糊為丸亦可調經補真湯冬後一月微有地泥氷泮其白帶再來隂户中寒一服立止獨活乾薑炮藁本防風蒼术已上各二分麻黃不去節炙甘人參去蘆當歸身白术生黃芩升麻已上各五分黃茋七分良薑澤瀉羌活已上各一錢柴胡四錢杏仁二箇桂枝少許白葵花右㕮咀除黃芩麻黃各另外都作一服先以水二大盞半煎麻黃一味令沸掠去沫入餘藥同煎至一盞零七分再入生黃芩煎至一盞空心服之候一時許可食早飯坐藥龍鹽膏茴香三分枯礬五分良薑當歸梢酒防己木通已上各一錢丁香木香川烏炮已上各一錢五分龍骨炒鹽紅豆肉桂已上各二錢厚朴三錢延胡索五錢全蝎五箇右為細末煉蜜為丸如彈子大綿裹留系在外內丸藥隂户內日易之勝隂丹為上藥力小再取三錢內加行性熱藥項下柴胡羌活枯白礬甘松升麻已上各一分川烏頭大椒三奈子已上各五分蒜七分全蠍三箇破故紙八分與蒜同煮焙乾稱麝香少許右為細末依前法用回陽湯羌活全蠍升麻根甘松已上各二分草烏頭水蛭炒已上各三分大椒三奈子蓽撥枯礬已上各三分柴胡川烏已上各七分炒黃鹽為必用之藥去之則不效破故紙蒜已上各一錢虻蟲三箇去翅足炒右為極細末依前製用臍下覺暖為效柴胡丁香湯治婦人年三十歲臨經先腰臍痛甚則腹中亦痛經縮三兩日生地黃二分丁香四分當歸身防風羌活已上各一錢柴胡一錢五分全蠍一箇右件都作一服水二盞煎至一盞去柤食前稍熱服延胡苦練湯治臍下冷撮痛隂冷大寒白帶下黃蘗一分為引用延胡索苦練子已上各二分附子炮肉桂已上各三分炙甘草五分熟地黃一錢右都作一服水二大盞煎至一盞食前後枝附湯治白帶腥臭多悲不樂大寒黃蘗為引用知母已上各五分肉桂一錢附子三錢右㕮咀都作一服水二盞煎至一盞去柤食逺熱服如少食常飽有時似腹脹夯悶加白芍藥五分如不思飲食加五味子二十箇如煩惱面上如蟲行乃胃中元氣極虗加黃茋一錢五分炙甘草升麻已上各五分人參補氣湯治四肢懶倦自汗無力丁香末二分生甘草梢炙甘草已上各三分生地黃白芍藥各五分熟地黃二分人參防風羌活黃蘗知母當歸身升麻已上各五分柴胡一錢黃茋一錢五分全蠍一箇五味子二十箇右銼如麻豆大都作一服水二盞煎至一盞去柤空心稍熱服黃茋白术湯治婦人四肢沈重自汗上至頭際頭而還惡風頭痛燥熱細辛三分吳茱萸川芎已上各五分柴胡升麻已上各一錢當歸身一錢五分黃蘗酒洗炙甘草羌活已上各二錢五味子三錢白术人參已上各五分黃茋二兩右㕮咀每服五錢水二大盞生薑五片煎至一盞去柤食前熱服如腹中痛不快加炙甘草一錢汗出不止加黃蘗一錢白术茯苓湯治胃氣弱身重有痰惡心欲吐是風邪羈絆於脾胃之間當先實其脾胃白术白茯苓半夏已上各一兩炒麴二錢麥蘖麵五分炒右㕮咀每服五錢水二大盞入生薑五片煎至一盞去柤不拘時服增味四物湯治婦人血積當歸川芎芍藥熟地黃京三稜乾漆肉桂廣茂已上各七分右為粗末每服五錢水二大盞煎至一盞去柤食前稍熱服補經固真湯白文舉正室白帶常漏久矣諸藥不效診得心包尺脈微其白帶下流不止叔和云崩中日久為白帶漏下時多骨木枯崩中者始病血崩久則血少復亡其陽故曰滑之物下流不止是本經血海將枯津液復亡枯乾不能滋養筋骨以本部行經藥為引用為使以人參甘油膩之藥潤其枯燥而滋益津液以大辛熱之氣味藥補其陽道生其血脈以苦寒之藥泄其肺而救上熱傷氣以人參補之以微苦溫之藥為佐而益元氣白葵花去蕚研爛四分陳皮五分不去白生黃芩細研引入郁李仁去皮尖研如泥甘草炙柴胡已上各一錢乾薑細末人參已上各二錢右件除黃芩外以水三盞煎至一盞七分再入黃芩同煎至一盞去柤空心熱服少時以早飯壓之溫衛補血湯治耳鳴鼻不聞香臭口不知榖味氣不快四肢困倦行步欹側髮脫落食不下膝冷隂汗帶下喉中吤吤不得卧口舌嗌乾大息頭不可以回顧項筋緊脊強痛頭旋眼黑頭痛欠嚏生地黃白术藿香黃蘗已上各一分牡丹皮蒼术王爪根橘皮吳茱萸已上各二分當歸身二分半柴胡人參熟甘草地骨皮已上各三分升麻四分生甘草五分黃茋一錢二分丁香一箇桃仁三箇葵花七朵右㕮咀作一服用水二大盞煎至一盞去柤食前熱服立效散治婦人血崩不止當歸蓮花心白綿子紅花茅花已上各一錢右銼如豆大白紙裹定泥固炭火燒灰存性為細末如乾血氣研血蝎為引好溫酒調服加輕粉一錢如血崩不止加麝香為引好溫酒調服四聖散治婦人赤白帶下川烏炮製生白礬已上各一錢紅娘子三箇班貓十箇煉蜜為丸如皂子大綿裹坐之溫經除濕湯十月霜冷後四肢無力乃痿厥濕熱在下焦也醋心者是濁氣不下降欲為漏也合眼麻木作者陽道不行也惡風寒者上焦之分皮膚中氣不行也開目不麻者目開助陽道故隂寒之氣少退也頭旋眩運者風氣下陷於血分不得伸越而作也近火則有之黃連一分柴胡草豆蔲神麴炒木香已上各五分麻黃不去節獨活當歸身黃蘗已上各三分升麻五分羌活七分炙甘草人參白术豬苓澤瀉已上各一錢黃茋橘皮蒼术已上各二分白芍藥一錢右銼坐麻豆大分作二服水二盞煎至一盞食逺服治肢節沈重疼痛無力之勝藥也補氣升陽和中湯李正臣夫人病診得六脈俱中得弦洪緩相合按之無力弦在上是風熱下陷入隂中陽道不行其證閉目則渾身麻木晝減而夜甚覺而開目則麻木漸退久則絶止常開其目此證不作懼其麻木不敢合眼致不得眠身體皆重時有痰嗽覺胸中常似有痰而不利時煩燥氣短促而喘肌膚充盛飲食不減大小便如常惟畏其麻木不敢合眼為最苦觀其色脈形病相應而不逆內經曰陽盛瞋目而動輕隂病閉目而靜重又云諸脈皆屬於目靈樞經云開目則陽道行陽氣遍布周身閉目則陽道閉而不行如晝夜之分知其陽衰而隂旺也且麻木為風三尺之童皆以為然細校之則有區别耳久坐而起亦有麻木為如繩縛之人釋之覺麻作而不敢動良久則自己以此驗之非有風邪乃氣不行也治之當補其肺中之氣則麻木自去矣如經脈中隂火乘其陽分火動於中為麻木也當兼去其隂火則愈矣時痰嗽者秋涼在外在上而作也當以溫劑實其皮毛身重脈緩者濕氣伏匿而作也時見躁作當升陽助氣益血微瀉隂火與濕通行經脈調其隂陽則已矣非五臟六腑之本有邪也此藥主之生甘草去腎熱酒黃蘗瀉火除濕白茯苓除濕𨗳火澤瀉除濕𨗳火升麻行陽助經柴胡已上各一錢蒼术除濕補中草豆蔲仁益陽退外寒已上各一錢五分橘皮當歸身白术已上各二錢白芍藥人參已上各三錢佛耳草炙甘草已上各四分黃茋五分右㕮咀每服五錢水二盞煎至一盞去柤食逺服之麻黃桂枝升麻湯治婦人先患渾身麻木睡覺則少減開目則已而全愈又治心中煩惱遍身骨節疼身體沈重飲食減少腹中氣不運轉木香生薑已上各一分桂枝半夏陳皮草豆蔲仁厚朴黑附子黃蘗已上各二分炙甘草升麻白术茯苓澤瀉已上各三分黃茋麻黃不去節人參已上各五分右都作一服水二盞煎至一盞去柤食逺服之蘭室祕藏卷中
