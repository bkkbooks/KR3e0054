body:
  text: 蘭室祕藏醫家類提要臣等謹案蘭室祕藏六卷金李杲撰其曰蘭室祕藏者蓋取黃帝素問藏諸靈蘭之室語前有至元丙子羅天益序在杲沒後二十五年疑即硯堅所謂臨終以付天益者也其治病分二十一門以飲食勞倦居首他如中滿腹脹如心腹痞如胃脘痛諸門皆諄諄於脾胃蓋其所獨重也東垣發明內傷之類外感實有至理而以土為萬物之母脾胃為生化之源脾虛損論一篇極言寒涼峻利之害尤深切著明蓋預睹劉張兩家末流攻伐之弊而早防其漸也至於前代醫方自金匱要略以下大抵藥味無多故唐書許允宗傳紀允宗之言曰病之於藥有正相當惟須單用一味直攻彼病藥力既敷病即立愈今人不能别脈莫識病證以情億度多安藥味譬之於獵未知兔所多發人馬空地遮圍或冀一人偶然逢也如此療病不亦疏乎其言歷代醫家傳為名論惟杲此書載所自製諸方動至一二十味而君臣佐使相制相用條理井然他人罕能效之者斯則事由神解不涉言詮讀是書者能喻法外之意則善矣乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0348f57849ff158a571ab6e6690bb7881850f5d632b356a1de8d9019dec1ca7b
