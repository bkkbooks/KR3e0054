body:
  text: 蘭室秘藏卷下元李杲撰大便結燥門大便結燥論金匱真言論云北方黑色入通腎開竅於二隂藏精於腎又云腎主大便大便難者取足少隂夫腎主五液津液潤則大便如常若飢飽失節勞役過度損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真隂津液虧少故大便結燥然結燥之病不一有熱燥有風燥有陽結有隂結又有年老氣虚津液不足而結燥者治法云腎惡燥急食辛以潤之結者散之如少隂不得大便以辛潤之太隂不得大便以苦泄之陽結者散之隂結者温之仲景云小便利而大便硬不可攻下以脾的丸潤之食傷太隂腹滿而食不化腹響然不能大便者以苦藥泄之如血燥而不能大便者以桃仁酒製大黄通之風結燥而大便不行者以麻子仁加大黄利之如氣澀而大便不通者以郁李仁枳實皂角仁潤之大抵治病必究其源不可一槩用巴豆牽牛之類下之損其津液燥結愈甚復下復結極則以至𨗳引於下而不通遂成不救噫可不慎哉通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥秘氣不得下治在幽門以辛潤之炙甘草紅花已上各一錢生地黄熟地黄已上各五分升麻桃仁泥當歸身已上各一錢右都作一服水二大盞煎至一盞去柤調㯽榔細末五分稍熱食前服之潤燥湯升麻生地黄已上各二錢熟地黄當歸梢生甘草大黄煨桃仁泥麻仁已上各一錢紅花五分右除麻仁桃仁另研如泥外剉如麻豆大都作一服水二盞入桃仁麻仁煎至一盞去柤空心稍熱服潤腸湯治脾胃中伏火大便秘澀或乾燥閉塞不通全不思食及風結血秘皆令閉塞也以潤燥和血踈風自然通利矣桃仁湯浸去皮尖麻仁已上各一兩當歸梢大黄煨羌活已上各五錢右除桃仁麻仁另研如泥外搗為極細末煉蜜為丸如梧桐子大毎服三五十丸空心白湯下如病人不大便為大便不通而澀其邪盛者急加酒洗大黄以利之如血燥而大便燥乾者加桃仁酒洗大黄如風結燥大便不行者加麻仁大黄如風濕而大便不行加煨皂角仁大黄秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黄以除氣燥如寒隂之病為寒結閉而大便不通者以局方中半硫丸或加煎附子乾薑湯以溫煖之其病雖隂寒之證當服陽藥補之若大便不通者亦當十服中與一服藥微通其大便不令結閉乃治之大法若病人雖是隂證或是隂寒之證其病顯燥脈實堅亦宜於陽藥中少加苦寒之藥以去熱躁躁止勿加如隂躁欲坐井中者其二腎脈按之必虚或沈細而遲此易為辯耳知有容邪之病亦當從權加藥以去之麻黄白术湯治大便不通五日一遍小便黄赤渾身腫面上及腹尤甚其色黄麻木身重如山沉困無力四肢痿輭不能舉動喘促唾清水吐噦痰唾白沫如膠時躁熱發欲去衣及發過振寒項額有時如氷額寒尤甚頭眩眼黑目中溜火冷淚鼻不聞香臭少腹急痛當臍有動氣按之堅硬而痛青皮去腐酒黄連已上各一分酒黄蘖橘紅甘草炙一半升麻已上各二分黄茋人參桂枝白术厚朴柴胡蒼术猪苓已上各三分呉茱萸白茯苓澤瀉已上各四分白豆蔲炒麴已上各五分麻黄不去節五分杏仁四箇右㕮咀分作二服水二大盞半先煎麻黄令沸去沫再入諸藥同煎至一盞去柤稍熱食逺服此證宿有風濕熱伏於榮血之中其木火乗於陽道為上盛元氣短少上喘為隂火傷其氣四肢痿在腎水之間乃所勝之病今正遇冬寒得時乗其肝木又實其母肺金尅火凌木是大勝必有大復其證善恐欠多􅅉鼻中如有物不聞香臭目視䀮䀮多悲健忘少腹急痛通身黄腹大脹面目腫尤甚食不下痰唾涕有血目眥􅅑大便不通並宜此藥治之升陽湯一名升陽瀉濕湯治膈咽不通逆氣裏急大便不行青皮槐子已上各二分生地黄熟地黄黄蘗已上各三分當歸身甘草梢已上各四分蒼术五分升麻七分黄茋一錢桃仁十箇另研右㕮咀如麻豆大都作一服入桃仁泥水二大盞煎至一盞去柤稍熱食前服活血潤燥丸治大便風秘血秘常常燥結當歸梢一錢防風三錢大黄濕紙裹煨羌活已上各一兩桃仁二兩研如泥皂角仁燒存性去皮一兩五錢其性得濕則滑濕滑則燥結自除麻仁二兩五錢研如泥右除麻仁桃仁另研如泥外為極細末煉蜜為丸如梧桐子大毎服五十丸白湯下三兩服後湏以蘇麻子粥毎日早晩食之大便日久不能結燥也以磁器盛之紙封無令見風潤腸湯治大腸結燥不通生地黄生甘草已上各二錢大黄煨熟地黄當歸梢升麻桃仁麻仁已上各一錢紅花三分右㕮咀水二盞煎至一盞去柤食逺温服小便淋閉門小便淋閉論難經云病有闗有格闗則不得小便又云闗無出之曲皆邪熱為病也分在氣在血而治之以渇與不渇而辯之如渇而小便不利者是熱在上焦肺之分故渇而小便不利也夫小便者是足太陽膀胱經所主也長生於申申者西方金也肺合生水若肺中有熱不能生水是絶其水之源經云虚則補其母宜清肺而滋其化源也故當從肺之分助其秋令水自生焉又如雨如露如霜皆從天而降下也乃陽中之隂明秋氣自天而降下也且藥有氣之薄者乃陽中之隂是感秋清肅殺之氣而生可以補肺之不足淡味渗泄之藥是也茯苓澤瀉琥珀燈心通草車前子木通瞿麥扁蓄之類以清肺之氣泄其火資水之上源也如不渇而小便不通者熱在下焦血分故不渇而大燥小便不通也熱閉於下焦者腎也膀胱也乃隂中之隂隂受熱邪閉塞其流易上老云寒在胷中遏絶不入熱在下焦填塞不便湏用感此方寒水之化氣味俱隂之藥以除其熱泄其閉塞内經云無陽則隂無以生無隂則陽無以化若服淡渗之藥其性乃陽中之隂非純陽之劑陽無以化何能補重隂之不足也湏用感地之水運而生大苦之味感天之寒藥而生大寒之氣此氣味俱隂乃隂中之隂也大寒之氣人禀之生膀胱寒水之運人感之生腎此藥能補腎與膀胱受陽中之陽熱火之邪而閉其下焦使小便不通也夫用大苦寒之藥治法當寒因熱用又云必伏其所主而先其所因其始則氣同其中則氣異也通闗丸一名滋腎丸治不渇而小便閉熱在下焦血分也黄蘗去皮剉酒洗焙知母剉酒洗焙乾已上各一兩肉桂五分右為細末熟水為丸如梧桐子大毎服一百丸空心白湯下頓兩足令藥易下行故也如小便利前隂中如刀刺痛當有惡物下為驗清肺飲子治渇而小便閉澀不利邪熱在上焦氣分燈心一分通草二分澤瀉瞿麥琥珀已上各五分扁蓄木通已上各七分車前子炒一錢茯苓去皮二錢猪苓去皮三錢右為麤末毎服五錢水一盞半煎至一盞稍熱食逺服或局方八正散五苓散亦宜服之𨗳氣除燥湯治小便閉塞不通乃血澀下氣不通而竅澀也茯苓去皮滑石炒黄已上各二錢知母細剉酒洗澤瀉已上各一錢黄蘗去皮酒洗四錢右㕮咀毎服五錢水三盞煎至一盞去柤稍熱空心服如急閉不拘時服腎疸湯治腎疸目黄甚至渾身黄小便赤澀羌活防風藁本獨活柴胡已上各五錢升麻五錢已上治腎疸目黄渾身黄白茯苓二分澤瀉三分猪苓四分白术五分蒼术一錢已上治小便赤澀黄蘗二分人參三分葛根五分神麴六分甘草三錢右剉如麻豆大分作二服水三盞煎至一盞去柤稍熱食前服痔漏門痔漏論内經云困而飽食筋脈横解腸澼為痔夫大腸庚也主津本性燥清肅殺之氣本位主收其所司行津以從足陽明旺則生化萬物者也足陽明為中州之土若陽衰亦殞殺萬物故曰萬物生於土而歸於土者是也以手陽明大腸司其化焉既在西方本位為之害蜚司殺之府因飽食行房忍泄前隂之氣歸於大腸木乗火勢而侮燥金故火就燥也大便必閉其疾甚者當以苦寒瀉火以辛温和血潤燥踈風止痛是其治也以秦艽當歸梢和血潤燥以桃仁潤血以皂角仁除風燥以地榆破血以枳實之苦寒補腎以下泄胃實以澤瀉之淡滲使氣歸於前隂以補清燥受胃之濕邪也白术之苦甘以苦補燥氣之不足其甘味以瀉火而益元氣也故曰甘寒瀉火乃假枳實之寒也古人因藥為下焦如瀆又曰在下者引而竭之多為大便秘澀以大黄推去之其津血益不足以當歸和血及油潤之劑大便自然輭利矣宜作剉湯以與之是下焦有熱以急治之之法也以地榆惡人而壊胃故宿食消盡空心作丸服之秦艽白术湯治痔疾幷痔漏有膿血大便燥硬而作疼痛不可忍秦艽去蘆桃仁湯浸去皮尖皂角仁當歸梢澤瀉枳實白术已上各五分地榆右為細末和桃仁泥研勻煎熟湯打麵糊為丸如鷄頭仁大令藥光滑焙乾毎服五七十丸白湯下空心服待少時以美食壓之忌生冷硬物冷水冷菜之類幷濕麵酒及辛辣熱大料物之類犯之則藥無驗也秦艽蒼术湯治痔疾若破謂之痔漏大便秘澀必作大痛此由風熱乗食飽不通氣逼大腸而作也受病者燥氣也為病者胃濕也胃刑大腸則化燥火以乗燥熱之實勝風附熱而來是濕熱風燥四氣而合故大腸頭成塊者濕也作大痛者風也若大便燥急者生病兼受火邪者結不通也去此四者其西方肺主諸氣其體收下亦助病為邪湏當破氣藥兼之治法全矣以剉湯與之其效如神秦艽桃仁湯浸去皮另研皂角仁蒼术防風黄蘗當歸梢澤瀉身㯽榔大黄少許右除㯽榔皂角仁桃仁三味外餘藥㕮咀如麻豆大都作一服水三盞煎至一盞二分去柤入㯽榔等三味末再上火煎至一盞空心熱服待少時以美膳壓之不犯胃氣也服藥日忌生冷硬物及酒濕麵大料物乾薑之類犯之則其藥無效如有白膿加白葵花頭五朶去蕚心青皮半錢不去白入正藥中同煎术香三分為細末同㯽榔等三味依前煎服頋古人治此疾多以歲月除之此藥二服則愈七聖丸治大腸疼痛不可忍叔和云積氣生於脾藏傍大腸疼痛陣難當漸交消瀉三焦火莫謾多方立紀綱羌活一兩郁李仁湯浸去皮一兩五錢大黄八錢煨㯽榔桂去皮木香川芎已上各五錢右除郁李仁另研入外共為細末煉蜜為丸如梧桐子大毎服三五十丸白湯下食前取大便微利一服而愈切禁不得多利大便其痛滋甚秦艽防風湯治痔漏毎日大便時發疼痛如無疼痛者非痔漏也此藥主之秦芄防風當歸身白术已上各一錢五分炙甘草澤瀉已上各六分黄蘗五分大黄煨橘皮已上各三分柴胡升麻已上各一分桃仁三十箇紅花少許右剉如麻豆大都作一服水三盞煎至一盞去柤稍熱空心服之避風寒忌房事酒濕麵大辛熱物秦艽羌活湯治痔漏成塊下垂不任其癢羌活一錢二分秦艽黄茋已上各一錢防風七分升麻炙甘草麻黄柴胡已上各五分藁本三分細辛少許紅花少許右剉如麻豆大都作一服水二盞煎至一盞去柤空心服之忌風寒處大小便當歸郁李仁湯治痔漏大便硬努出大腸頭下血苦痛不能忍郁李仁皂角仁已上各一錢枳實七分秦艽麻仁當歸梢生地黄蒼术已上各五分大黄煨澤瀉已上各五分右剉如麻豆大除皂角仁别為末水三盞煎至一盞去柤入皂角仁末調空心食前服之忌如前紅花桃仁湯治痔漏經年因而飽食筋脈横解腸澼為痔治法當補北方瀉中央黄蘗一錢五分生地黄一錢澤瀉八分蒼术六分當歸梢漢防己防風梢猪苓已上各五分麻黄二分紅花半分桃仁十箇右剉如麻豆大水三盞煎至一盞去柤稍熱食前服之忌如前秦艽當歸湯治痔漏大便結燥疼痛大黄煨四錢秦艽枳實已上各一錢澤瀉當歸梢皂角仁白术已上各五分紅花少許桃仁二十箇右都作一服水三盞煎至一盞去柤食前熱服忌如前隂痿隂汗門隂痿隂汗及臊臭論一富者前隂臊臭又因連日飲酒腹中不和求先師治之曰夫前隂者足厥隂肝之脈絡循隂器出其挻末凡臭者心之所主散入