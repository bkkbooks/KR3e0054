子而助火重虗其土殺人無疑矣其風木旺證右闗脈洪大掌中熱腹皮熱豈可以助火瀉金如寒水來乗脾土其病嘔吐腹痛瀉痢青白益黄散聖藥也令立一方先瀉火補金大補其土是為神治之法黄茋湯黄茋二錢人參一錢炙甘草五分右㕮咀作一服水一大盞煎至半盞去柤食逺服加白芍藥尤妙此三味皆甘温能補元氣甘能瀉火内經云熱淫於内以甘瀉之以酸収之白芍藥酸寒寒能瀉火酸味能㵼肝而又補肺金所補得金土之位大旺火虗風木何由而來尅土然後瀉風之邪夫益黄散理中丸養神丸之類皆治脾胃寒濕大盛神品之藥也若得脾胃中伏熱火勞役不足之證及服熱藥巴豆之類胃虗而成慢驚之證用之必傷人命夫慢驚風者皆由久瀉脾胃虗而生也錢氏以𦍑活膏療慢驚風誤矣脾虗者由火邪乗其土位故曰從後來者為虚邪火旺能實其木木旺故來尅土當令心經中以甘温補土之源更於脾土中瀉火以甘寒更於脾土中補金以酸涼致脾土中金旺火衰風木自虚矣損食多進藥愈前藥是也益黄散治胃中風黄茋二錢陳皮去白人參芍藥七分生甘草熟甘草黄連右為細末毎服二錢水一盞煎至五分食前服升陽益血湯二月間有一小兒未滿一百日病腹脹二日大便一度痩弱身黄色宜升陽氣滋血益血補血利大便蠍梢二分神麴末升麻已上各三分當歸厚朴已上各一錢桃仁右都作一服水一大盞煎至半盞去柤食逺熱服厚腸丸治小兒失乳以食飼之未有食腸不能尅化或生腹脹四肢痩弱或痢色無常厚朴青皮橘紅半夏蒼术人參枳實麥蘖麵神麴末右為極細末水煑麵糊為丸如麻子大毎服二十丸温水送下食前忌飽食補陽湯時初冬一小兒二歲大寒證明堂青脈額上青黒腦後青絡髙起舌上白滑喉鳴而喘大便微青耳尖冷目中常常淚下仍多眵胷中不利卧而多驚無搐則寒黄蘖橘皮葛根連翹蠍梢炙甘草已上各一分升麻黄茋柴胡已上各二分當歸身麻黄已上各三分呉茱萸生地黄地黄已上各五分右㕮咀都作一服水一大盞半煎至六分去柤乳食後熱服服藥之後添喜笑精神出氣和順乳食旺大蕪荑湯一名梔子茯苓湯治黄疳土色為熱為濕當小便不利今反利知黄色為燥胃經中大熱髪黄脫落知膀胱與腎俱受土邪乃大濕熱之證鼻下斷作瘡者上逆行榮氣伏火也能乳者胃中有熱也寒則食不入喜食土者胃不足也面黑色者為寒為痺大便青寒褐色血黑色熱畜血中間黄色腸中有熱治法當滋榮潤燥除寒熱致津液防風黄連已上各一分黄蘖炙甘草麻黄不去根節羌活已上各二分山梔子仁柴胡茯苓已上各三分當歸四分大蕪荑白术已上各五分右剉如麻豆大都作一服用水一大盞半煎至六分去柤食前稍熱服塌氣退黄湯治小兒面色痿黄腹䐜脹食不能下白术柴胡已上各半分升麻一分桂枝麻黄呉茱萸厚朴𦍑活草豆蔲神麴末蒼术澤瀉白茯苓猪苓黄蘖橘紅已上各二分青皮黄連已上各五分杏仁二箇右都作一服水二大盞煎至一盞去柤食前温服中滿分消丸枳實黄連厚朴已上各五分生薑薑黄猪苓已上各一錢橘皮甘草白术已上各一錢五分砂仁澤瀉茯苓已上各三錢半夏四錢黄芩一兩二錢右為細末湯浸􅔻餅為丸如黍米大毎服三五十丸温水下消痞丸黄連五錢黄芩二錢厚朴七分薑黄五分乾生薑人參已上各四分甘草三分枳實二分橘皮四分右為細末湯浸􅔻餅為丸如黍米大毎服三十丸隨乳下癍疹論夫癍疹始出之證必先見面燥腮赤目胞亦赤呵欠煩悶乍涼乍熱咳𠻳􅅉噴足稍冷多睡驚並瘡疹之證或生膿胞或生小紅癍或生癮疹此三等不同何故俱顯上證而後乃出盖以上諸證皆太陽寒水起於右腎之下煎熬左腎足太陽膀胱寒水夾脊逆流上頭下額逆手太陽丙火不得傳𨗳逆於面上故顯是證盖壬癸寒水尅丙丁熱火故也諸癍症皆從寒水逆流而作也醫者當知此理乃敢用藥夫胞者一名赤宫一名丹田一名命門主男子藏精施化婦人繫胞受孕俱為生化之源非五行也非水亦非火此天地之異名也象坤土之生萬物也夫人之始生也血海始净一日二日精勝其血則為男子三日四日五日血脈已旺精不勝血則為女子二物相搏長生先身謂之神又謂之精道釋二門言之本來面目是也其子在腹中十月之間隨如呼吸呼吸者陽氣也而生動作滋益精氣神饑則食母血渇則飲母血兒隨日長皮筋骨血脈形氣俱足十月降生口中尚有惡血啼聲一發隨吸而下此惡血復歸命門胞中僻於一隅伏而不發直至因内傷乳食濕熱之氣下流合於腎中二火交攻致營氣不從逆於肉裡惡血乃發諸癍疹皆出於膀胱壬水其瘍後聚肉理歸於陽明故三畨癍始顯之證皆足太陽壬膀胱尅病小膓其始出皆見於面終歸於陽明肉熱化為膿者也二火熾甚反勝寒水遍身俱出此皆出從足太陽傳變中來也當外發寒邪使内消散内瀉二火不令交攻其中令濕氣上歸復其本位可一二服立已仍令小兒以後再無一畨癍出之患此内經之法覽者詳之消毒救苦散治癍證悉具消化便令不出如已出希者再不生癍防風羌活麻黄根升麻生地黄連翹初出者大者佳酒黄蘗已上各五分當歸身黄連已上各三分川芎藁本柴胡葛根酒黄芩生黄芩蒼术已上各二分細辛生甘草白术陳皮蘇木紅花已上各一分呉茱萸半分右剉如麻豆大毎服五錢水二大盞煎至一盞去柤稍熱空心服夫㿀疹出者皆因内傷必出癍營氣逆故也大禁牽牛巴豆食藥宜以半夏枳木大黄益智仁之類去其青瀉止其吐若耳尖冷呵欠睡中驚􅅉噴眼澀知必出癍也諸大膿泡小水癍疹癮三色皆營氣逆而寒復其表宜以四味升麻湯中加當歸身連翹此定法也如肺成膿癍先𠻳喘或氣髙而喘促加人參少加黄芩以瀉伏火而補元氣如心出小紅癍必先見嗌乾驚悸身熱肌肉腫脈弦洪少加黄連如命門出癮疹必先骨疼身熱其疼痛不散動搖少加生地黄又加黄蘖諸癍疹皆為隂證瘡湏皆因内傷飲食脾胃不足營氣逆行雖大熱内熾隂覆其外治法如前辯小兒癍證呵欠􅅉噴睡中發驚或耳尖冷眼澀或辯復食口熱或口醋氣妳辨不消或腹中痛如癍證少具其癍未發乃與升麻湯三五錢帶熱服之待身表温和癍疹已顯服藥乃止如其身涼其癍未出辯得是癍證無問服數直候身表温和及癍瘡已顯然後乃止只時時與桔梗湯寛胸膈利咽喉桔梗湯如癍已出只時時與之快咽喉寛利胸膈桔梗二錢甘草一錢炙右為麤末毎服三錢水一大盞煎至六分去柤大温時時服之不可計服數如見傷食證又見癍證先與不犯大黄巴豆藥尅化過再與升麻湯如食重傷前藥不能過再與犯大黄巴豆藥過如大便行當即便與升麻湯服之恐癍子内䧟已後臨時作罪過如癍子已出稠宻身表熱急與下項黍粘子湯如癍子已出稠宻身表熱急與此藥服之防後青乾黑䧟黍粘子當歸身炙甘草已上各一錢柴胡連翹黄茋黄芩已上各一錢五分地骨皮已上二錢右同為麤末毎服二錢水一大盞煎至六分去柤温服腹空服藥畢日休與乳食麻黄柴胡升麻湯治小兒寒鬰而喉鳴腹中鳴腹滿鼻流清涕脈沈急而數麻黄草豆蔲仁益智仁已上各一錢五分呉茱萸厚朴各二分當歸梢甘草柴胡生黄芩已上各一分升麻神麴蘇木已上各七分全蠍二箇紅花少許右剉如麻豆大分作二服水一大盞煎至七分食逺服忌風寒㣲有汗則效蘭室秘藏卷下
