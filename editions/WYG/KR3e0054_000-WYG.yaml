body:
  text: 蘭室秘藏醫家類提要臣等謹案蘭室秘藏六􅃃金李杲撰其曰蘭室秘藏者葢取黄帝素問藏諸靈蘭之室語前有至元丙子羅天益序在杲没後二十五年疑即硯堅所謂臨終以付天益者也其治病分二十一門以飲食勞倦居首他如中滿腹脹如心腹痞如胃脘痛諸門皆諄諄於脾胃葢其所獨重也東垣發明内傷之類外感實有至理而以土為萬物之母脾胃為生化之源脾虚損論一篇極言寒凉峻利之害尤深切著明葢預睹劉張兩家末流攻伐之弊而早防其漸也至於前代醫方自金匱要畧以下大抵藥味無多故唐書許允宗傳紀允宗之言曰病之於藥有正相當惟湏單用一味直攻彼病藥力既尃病即立愈今人不能别脈莫識病證以情億度多安藥味譬之於獵未知兎所多發人馬空地遮圍或冀一人偶然逢也如此療病不亦疎乎其言歴代醫家傳為名論惟杲此書載所自製諸方動至一二十味而君臣佐使相制相用條理井然他人罕能效之者斯則事由神觧不渉言詮讀是書者能喻法外之意則善矣乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:738ef261a896b7699d1e6a6118eb0fcec15ce1bd91298d019daf402e0bafefab
