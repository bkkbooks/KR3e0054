body:
  text: 蘭室秘藏卷上元李杲撰飲食勞倦門飲食所傷論隂陽應象論云水糓之寒熱感則害人六府痺論云隂氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺病則為喘咳為腫滿為水瀉輕則當發汗利小便使上下分消其濕解酲湯五苓散生薑半夏枳實白术之􅁼是也如重而畜積為滿者芫花大㦸甘遂牽牛之屬利下之此其治也食者物也有形之血也如生氣通天論云因而飽食筋脈横解腸澼為痔又云食傷太隂厥隂寸口大於人迎兩倍三倍者或嘔吐或痞滿或下痢腸澼當分寒熱輕重而治之輕則内消重則除下如傷寒物者半夏神麴乾薑三稜廣茂巴豆之􅁼主之如傷熱物者枳實白术青皮陳皮麥蘖黄連大黄之􅁼主之亦有宜吐者隂陽應象論云在上者因而越之𤓰蔕散之屬主之然而不可過劑過劑則反傷腸胃盖先因飲食自傷又加之以藥過故腸胃復傷而氣不能化食愈難消矣漸至羸困故五常政大論云大毒治病十去其六小毒治病十去其七凡毒治病不可過之此聖人之深戒也勞倦所傷論調經篇云隂虚生内熱岐伯曰有所勞倦形氣衰少糓氣不盛上焦不行下脘不通而胃氣熱熱氣薫胸中故内熱舉痛論云勞則氣耗勞則喘且汗出内外皆越故氣耗矣夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乗其脾土脾主四肢故困熱無氣以動􅂴於語言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其熱火以酸味收其散氣以甘温補其中氣經言勞者温之損者温之者是也金匱要略云平人脉大為勞脈極虚亦為勞矣夫勞之為病其脈浮大手足煩熱春夏劇秋冬差脈大者熱邪也極實者氣損也春夏劇者時助邪也秋冬差者時勝邪也以黄耆建中湯治之此亦温之之意也夫上古聖人飲食有節起居有常不妄作勞形與神俱百嵗乃去此謂治未病也今時之人去聖人乆逺則不然飲食失節起居失宜妄作勞役形氣俱傷故病而後藥之是治其已病也推其百病之源皆因飲食勞倦而胃氣元氣散解不能滋榮百脉灌溉臟腑衛護周身之所致也故蒼天之氣貴清靜陽氣惡煩勞噫飲食喜怒之間寒暑起居之際可不慎歟調中益氣湯治因飢飽勞役損傷脾胃元氣不足其脈弦洪緩而沈按之中之下得時一澀其證四肢滿悶肢節疼痛難以屈伸身體沉重煩心不安忽肥忽瘦四肢􅂴倦口失滋味腹難舒伸大小便清利而數或上飲下便或大便澀滯或夏月餐泄米糓不化或便後見血或便見白膿胸滿短氣咽膈不通痰唾稠粘口中沃沫食入反出耳鳴耳聾目中流火視物昏花弩肉紅絲熱壅頭目不得安卧不思飲食並皆治之橘皮如腹中氣不轉運加木香一分如無此證不加黄蘗酒洗已上各二分升麻此一味為上氣不足胃氣與脾氣下流乃補上氣從隂引陽柴胡已上各三分人參有𠻳者去炙甘草蒼术已上各五分黄茋一錢如是顯熱躁是下元隂火蒸蒸然發也加生地黄二分黄蘗三分如大便虚坐不得或大便了而不了腹中常常逼迫皆是血虚血澀加當歸身三分無此證則去之如身體沈重雖小便數多亦加茯苓二分黄蘗三分澤瀉五分蒼术一錢時暫從權而去濕也不可常用兼足太隂已病其脈亦絡於心中故顯濕熱相合而生煩亂如胃氣不和加湯洗半夏五分生薑三分有𠻳者加生薑生地黄二分以製半夏之毒如痰厥頭痛非半夏不能除此足太隂脾邪所作也如兼躁熱加黄蘗生地黄各二分如無以上證只服前藥右件剉如麻豆大都作一服水二大盞煎去柤稍熱食逺服之寧心絶慮靜坐少語藥必為效耳如夏月湏加白芍藥三分如春月腹中痛尤宜加如惡熱而渴或腹痛者更加芍藥五分生黄芩二分如惡寒腹痛加中桂三分去黄芩謂之桂枝芍藥湯亦於前藥中加之如冬月腹痛不可用芍藥盖大寒之藥也只加乾薑二分或加半夏五七分以生薑少許製之如秋冬之月胃脈四道為衝脈所逆脇下少陽脈二道而反上行名曰厥逆其證氣上衝咽不得息而喘息有音不得卧加呉茱萸五分至一錢湯洗去苦觀厥氣多少而用之亦於前藥中作一服服之如夏月有此證為大熱也此病隨四時為寒熱温涼也宜以黄連酒洗黄蘗酒浸知母酒浸已上各等分右為細末熟湯為丸如梧桐子大每服一百丸或二百丸白湯送下空心服仍多飲熱湯服畢少時便以美食壓之使不令胃中停留直至下元以瀉衝脈之邪也大抵治飲食勞倦所得之病乃虚勞七損證也常宜以甘温平之甘多辛少是其治也寛中喜食無厭丸一名寛中進食丸資形氣喜飲食木香五分青皮人參乾生薑已上各一錢炙甘草一錢五分白茯苓澤瀉㯽榔橘皮白术已上各二錢縮砂仁猪苓已上各二錢五分枳實四錢半夏七錢草豆蔲仁五錢神麯五錢五分炒大麥糵麵一兩炒右為細末湯浸蒸餅為丸如梧桐子大每服三五十丸米湯下食逺交泰丸升陽氣瀉隂火調榮氣進飲食助精神寛腹脇除怠惰嗜卧四肢沉困不收乾薑炮製三分巴豆霜五分人參去蘆肉桂去皮已上各一分柴胡去苖小椒炒去汗并閉目者良白术已上各一錢五分厚朴去皮炒二錢秋各加七錢白茯苓苦練酒煑縮砂仁已上各三錢知母四錢一半酒炒一半酒洗春夏用秋冬去之川烏炮製去皮臍四錢五分呉茱茰湯洗七次五錢皂角水洗煨去皮紫菀去苖已上各六錢黃連去鬚七錢秋冬減一錢五分右除巴豆霜别研外同為極細末煉蜜為丸如梧桐子大毎服十丸温水送下食逺虚實加減木香人參生薑枳术丸開胃進飲食乾生薑二錢五分木香三錢人參三錢五分陳皮四錢枳實一兩炒白术一兩五錢右為細末荷葉裹燒飯為丸如梧桐子大毎服三五十丸温水下食前木香乾薑枳术丸破除寒滯氣消寒飲食木香三錢乾薑五錢炮枳實一兩炒白术一兩五錢右為細末荷葉裹燒飯為丸如梧桐子大毎服三五十丸温水送下食前扶脾丸治脾胃虚寒腹中痛溏瀉無度飲食不化乾生薑肉桂已上各五分乾薑霍香紅豆已上各一錢白术茯苓橘皮半夏訶子皮炙甘草烏梅肉已上各二錢大麥糵炒神麴炒已上各四錢右為細末荷葉燒飯為丸如梧桐子大毎服五十丸白滚湯送下食前和中丸補胃進食人參乾生薑陳皮已上各一錢乾木𤓰二錢炙甘草三錢右為細末湯浸蒸餅為丸如梧桐子大毎服五十丸白湯送下食前㯽榔丸破滯氣消飲食炙甘草一錢木香人參㯽榔已上各二錢陳皮五錢右為細末湯浸蒸餅為丸如梧桐子大毎服五十丸白湯下食前消積滯集香丸治傷生冷硬物不消京三稜廣茂青皮陳皮丁香皮益智川練子茴香已上各一兩巴豆和皮米炒五錢右為細末醋糊為丸如菉豆大毎服五七丸温水生薑湯任下食前服黄茋湯補胃除濕和血益血滋養元氣木香氣通去之霍香葉已上各一錢當歸酒洗陳皮已上各二錢人參澤瀉已上各五錢黄茋一兩右㕮咀毎服五錢水二大盞煎至一盞如欲汗加生薑煎食逺熱服之黄茋當歸湯治熱上攻頭目沿身胷背發熱當歸身一錢酒洗黄茋五錢右㕮咀作一服水二大盞煎至一盞食前熱服膀胱經中有寒氣不足者並宜服之於月生月滿時食隔三五日一服如病急不拘時候麻黄豆䓻丸治客寒犯胃心胃大痛不可忍木香青皮紅花厚朴已上各二分蘇木三分蓽澄茄四分升麻半夏湯洗麥蘖麵縮砂仁黄茋白术陳皮去白柴胡炙甘草呉茱萸當歸身已上各五分益智仁五分神麯二錢炒麻黄不去節三分草豆䓻仁五錢右為細末湯浸蒸餅為丸如梧桐子大毎服五十丸白湯下或細嚼湯下亦可酒客病論論酒大熱有毒氣味俱陽乃無形之物也若傷之則止當發散汗出則愈矣此最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有今之酒病者徃徃服酒癥丸大熱之藥下之又有牽牛大黄下之是無形元氣痛人參甘草縮砂仁厚朴已上各二錢白豆䓻姜黄乾生薑澤瀉已上各三錢益智仁六錢黄茋陳皮已上各七錢右為麤末毎服三錢水二盞生薑五片煎至一盞去柤食前温服脾胃虚損論易水張先生常戒不可峻利食藥下咽未至藥丸施化其標皮之力始開便言快也所傷之物已去若更待一兩時辰許藥盡化開其藥峻利必有情性病去之後脾胃既損是真氣元氣敗壞促人之壽當時説下一藥枳實一兩麩炒黄色為度白术二兩只此二味荷葉裹燒飯為丸以白术甘温甘温補脾胃之元氣其苦味除胃中之濕熱利腰臍間血故先補脾胃之弱過於枳實尅化之藥一倍枳實味苦寒泄心下之痞悶消化胃中所傷此一藥下胃其所傷不能即去湏待一兩時辰許食則消化是先補其虚而後化其所傷則不峻利矣當是之時未悟用荷葉燒飯為丸之理老年味之始得可謂竒矣荷葉之物中央空象震卦之體震者動也人感之生足少陽甲膽者風也先化萬物之根蔕也内經云内端於始亨則不愆人之飲食入胃營氣上行即少陽甲膽之氣也其手少陽三焦經人之元氣也手足經同法便是少陽元氣生發也胃氣糓氣元氣甲膽上升之氣一也異名雖多止是胃氣上升者也荷葉之體生於水土之下出於汚穢之中所染挺然獨立其色青形乃空青而象風木者也食藥感此氣之化胃氣何由不上升乎其主意用此一味為引味可謂逺識深慮合於道者也更以燒飯和藥與白术恊力滋養糓而補令胃厚再至内傷其利廣矣大矣若内傷脾胃以熱之物酒肉之類自覺不快覔藥於醫醫者亦不問所傷付之集香丸小丁香丸巴豆大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣則七神不熾經云熱傷氣正謂此也其後必無氣以動而熱困四肢不舉傳變諸疾不可勝數使人真氣自此衰矣若傷生冷硬物世醫或用大黄牽牛二味大寒藥投之随藥下所傷去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋肉血脈無所依倚便為虚損之證論言及此令人寒心夫辛辣薄味之藥無故不可亂服非止牽牛而已至真要大論云五味入口各先逐其所喜攻攻者尅伐瀉也辛味下咽先攻瀉肺之五氣氣者真氣元氣也其牽牛之辛辣猛烈傷人尤甚飲食所傷腸胃邪當以苦泄其腸胃可也肺與元氣何以罪之有用牽牛大罪有五此其一也况胃主血所生病為所傷物者有形之物也皆是血病瀉其氣其罪二也且飲食傷之於中焦止合尅化消𨗳其食重瀉上焦肺中已虚之氣其罪三也食傷腸胃當寒因寒用又曰寒因寒用枳實大黄苦寒之物以泄有形是也反以辛辣牽牛散瀉真氣大禁四也殊不知鍼經有云外來客邪風寒傷人五臓若誤瀉胃氣必死悞補亦死其死也無氣以動故静若内傷腸胃而反瀉五臓必死悞補亦死其死也隂氣有餘故躁今内傷腸胃是謂六腑不足之病反瀉上焦虚無肺氣肺者五臟之一數也雖不即死若更旬日之間必暗損人壽數謂如人壽應百歲為牽牛之類朝損暮損損其元氣消耗不得終其天年但人不覺耳將為天年已盡此乃暗裏折人壽數故特著此論并方庶令四海聞而行之不至夭横耳老夫之用心也胃氣不可不養復明養胃之理内經云安糓者昌絶糓者亡去則榮散糓消則亡榮散衛亡神無所依仲景云水入於經其血乃成糓入於胃脈乃大行故血不可不養胃不可不温血温胃和榮衛將行常有天命糓者身之大柄也書與周禮皆云金木水火土糓惟脩以奉養五臟者也内傷飲食固非細事茍妄服食藥而輕生損命其可乎哉黄帝鍼經有説胃惡熱而喜清冷大腸惡清冷而喜熱兩者不和何以調之岐伯曰調此者食飲衣服亦欲適寒温寒無悽愴暑無汗飲食者熱無灼灼寒無凄凄寒温中適故氣調乃不致邪僻也是必有因用豈可用俱寒俱熱之藥倉卒致損與以刄殺人者何異内經説内傷者其氣口脈反大於人迎一倍二倍三倍分經用藥又曰上部有脈下部無脈其人當吐不吐者死如但食不納惡心欲吐者不問一部二部不當正與𤓰蒂散吐之但以指或以物探去之若所傷之物去不盡者更診其脈問其所傷以食藥去之以應塞因塞用又胃之寒因泄而下降乃應太隂之用其中更加升發之藥令其元氣上升塞因通用因曲而為直何為曲内傷胃氣是也何為直因而升發胃氣是也因其飲食之内傷而使生氣增益胃氣寛復此乃因曲而為之直也若分經用藥其所傷之物寒熱温涼生硬柔輭所傷不一難立定一法只隨所傷之物不同各立治法臨時加減用之其用藥又當問病人從來稟氣盛衰所傷寒物熱物是喜食之邪不可服破氣藥若乗飢困而傷之邪當益胃氣或為人所勉勸強食之宜損血而益氣也診其脈候傷在何臓可與對病之藥豈可妄瀉天真生氣以輕身喪寳乎且如先食熱物而不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少斟酌與藥無不當矣喻如傷熟物二分寒物一分則當用寒藥二分熱藥一分相合而與之則榮衛之氣必得周流更有或先飲酒而後傷寒冷之食及傷熱食冷水與氷如此不等皆當驗其節次所傷之物酌量寒熱之劑分數各各對證與之無不取效自忖所定藥方未敢便謂能盡性之理姑用指迷辯惑耳三黄枳术丸治傷肉濕麵辛辣味厚之物填塞悶亂不快枳實麩炒五錢黄連去鬚酒洗大黄濕紙裹煨神麯炒橘皮白术已上各一兩黄芩二兩右為極細末湯浸􅔻餅為丸如菉豆一倍大毎服五十丸白湯下量所傷多少加減服之巴豆三稜丸一名木香見現丸半夏湯洗七次神麴炒已上各五錢草豆蔲麵裹煨去皮取仁白术已上各一兩枳實麩炒二兩右為極細末湯浸􅔻餅為丸如菉豆大毎服五十丸白湯下中滿腹脹門中滿腹脹論六元政紀論云太隂所至為中滿太隂所至為畜滿諸濕腫滿皆屬脾土論云脾乃隂中之太隂同濕土之化脾濕有餘腹滿食不化天為陽為熱主運化地為隂為濕主長養也無陽則隂不能生化故云藏寒生滿病調經篇云因飲食勞倦損傷脾胃始受熱中末傳寒中皆由脾胃之氣虚弱不能運化精微而制水糓聚而不散而成脹滿經云腹滿䐜脹支膈胠脇下厥上冒過在太隂陽明乃寒濕鬱遏也脈經所謂胃中寒則脹滿者是也鍼經二卷雜病第八腹滿大便不利上走胷溢喘息喝喝然取足少隂又云脹取三陽三陽者足太陽寒水為脹與通評虚實論説腹暴滿按之不下取太陽經絡胃之募也正同取者瀉也經云中滿者瀉之於内者是也宜以辛熱散之以苦瀉之淡滲利之使上下分消其濕正如開鬼門潔净府温衣繆刺其處是先瀉其血絡後調其真經氣血平陽布神清此治之正也或曰諸脹腹大皆屬於熱者何也此乃病機總辭假令外傷風寒有餘之邪自表傳裏寒變為熱而作胃實腹滿仲景以大承氣湯治之亦有膏粱之人濕熱鬱於内而成脹滿者此熱脹之謂也大抵寒脹多而熱脹少治之者宜詳辯之諸腹脹大皆屬於熱論諸腹脹大皆屬於熱此乃八益之邪有餘之證自天外而入是感風寒之邪傳裏寒變為熱作胃實日晡潮熱大渴引飲讝語是太陽陽明并大實大滿者大承氣湯下之少陽陽明㣲滿實者小承氣湯下之泄之則脹已此之謂也假令瘧病為脹滿亦有寒脹熱脹是天之邪氣傷暑而得之不即時發至秋暑氣衰絶而瘧病作矣知其寒也局方用交解飲子者是也内虚下實寒濕令人中滿乃五臓六腑俱有脹滿更以脈家寒熱多少較之胃中寒則脹滿濁氣在上則生脹䐜脹取三陽三陽者足太陽膀胱寒水為脹腹暴滿按之不下取太陽經絡者胃之募也正同腹滿䐜脹肢膈胠脇下厥上冒過在太隂陽明胃中寒濕鬱遏也太隂䐜脹復不利不欲食食則嘔不得卧按所説寒脹之多如此中滿治法當開鬼門㓗浄府開鬼門者謂發汗也潔浄府者利小便也中滿者瀉之於内謂脾胃有病令上下分消其氣下焦如瀆氣血自然分化不待泄滓穢如或大實大滿大小便不利從權以寒熱藥下之或傷酒濕麵及味厚之物膏粱之人或食已便卧使濕熱之氣不得施化致令腹脹滿此脹亦是熱治熱脹分消丸主之如或多食寒凉及脾胃久虚之人胃中寒則脹滿或藏寒生滿病以治寒脹中滿分消湯主之中滿分消丸治中滿熱脹鼓脹氣脹水脹此非寒脹類白术人參炙甘草猪苓去黒皮姜黄已上各一錢白茯苓去皮乾生薑砂仁已上各二錢澤瀉橘皮已上各三錢知毋炒四錢黄芩去腐炒夏用一錢二分黄連净炒半夏湯洗七次枳實炒已上各五錢厚朴薑製一兩右除茯苓澤瀉生薑外共為極細末入上三味和勻湯浸􅔻餅為丸如梧桐子大毎服一百丸焙熟白湯下食逺服量病人大小加减中滿分消湯治中滿寒脹寒疝大小便不通隂燥足不收四肢厥逆食入反出下虚中滿腹中寒心下痞下焦燥寒沉厥奔豚不收川烏澤瀉黄連人參青皮當歸生薑麻黄柴胡乾薑蓽澄茄已上各二錢益智仁半夏茯苓木香升麻已上各三分黄茋呉茱茰厚朴草豆蔲仁黄蘗已上各五分右剉如麻豆大都作一服水二大盞煎至一盞食前熱服忌房室酒濕麵生冷及油膩等物廣茂潰堅湯治中滿腹脹内有積聚堅硬如石其形如盤令人不能坐卧大小便澀滯上喘氣促面色痿黄通身虚腫廣茂紅花升麻呉茱茰已上各二分生甘草柴胡澤瀉神麯青皮陳皮已上各三分厚朴生用黄芩黄連益智仁草豆蔲仁當歸梢已上各三分半夏如渴加葛根四分右剉如麻豆大水二大盞煎至一盞稍熱服食逺忌酒醋濕麵服二服之後中滿減半有積不消再服後藥半夏厚朴湯紅花蘇木已上各五厘呉茱茰