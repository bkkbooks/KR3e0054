酒病之有今之酒病者徃徃服酒癥丸大熱之藥下之又有牽牛大黄下之是無形元氣受病反下有形隂血乖悞甚矣酒性大熱已傷元氣而復重瀉之况亦損腎水真隂及有形隂血俱為不足如此則隂血愈虚真水愈弱陽毒之熱大旺反增其隂火是謂元氣消亡七神何依折人長命雖不即死而虚損之病成矣金匱要畧云酒疸下之久久為黒疸慎不可犯此戒不若令上下分消其濕當以葛花解酲湯主之葛花解酲湯木香二錢人參去蘆猪苓去黒皮白茯苓橘皮已上各一錢五分白术乾生薑神麴炒澤瀉已上各一錢葛花五錢縮砂仁五錢四花青皮三錢白豆蔲仁五錢右為極細末和勻毎服三錢匕白湯調下但得微汗酒病去矣此盖不得已而用豈可恃頼日日飲酒此藥氣味辛辣偶因酒病服之則不損元氣何者敵酒病故也若頻服之損人天命枳术丸治痞消食强胃枳實微炒黄色一兩白术二兩右為極細末荷葉裹燒飯為丸如菉豆大倍大毎服五十丸白湯下不拘時候量所傷多少加減服之半夏枳术丸治因冷物内傷半夏湯洗七次一兩枳實麩炒黄色白术已上各三兩右三味為極細末荷葉裹燒炊飯為丸如菉豆一倍大毎服五十丸白湯下量所傷加減服之橘皮枳术丸治元氣虚弱飲食不消或臟腑不調心下痞悶橘皮枳實麩炒黄色各一兩白术二兩右為極細末荷葉裹燒飯為丸如菉豆一倍大毎服五十丸白湯下量所傷加減服之除濕益氣丸治傷濕麵心腹滿悶肢體沉重紅花三分蘿蔔子炒熟五錢枳實麩炒黄色黄芩生用神麴炒黄色白术已上各一兩右同為極細末荷葉裹燒飯為丸如菉豆一倍大毎服五十丸白湯下量所傷加減服之除濕散治傷馬妳子并牛羊酪水一切冷物甘草炙紅花已上各二錢半夏湯洗七次乾生薑已上各三錢車前子澤瀉已上各五錢茯苓七錢神麴炒黄色一兩右為極細末毎服三錢七白湯調下食前升麻黄連丸治多食肉口臭不欲聞其穢惡氣使左右不得近白檀二錢生甘草三錢生薑取自然汁蓮花青皮升麻已上各五錢黄連去鬚一両黄芩去腐酒洗二兩右為極細末湯浸􅔻餅為丸如彈子大毎服一丸細嚼白湯下食後上二黄丸治傷熱食痞悶兀兀欲吐煩亂不安甘草二錢升麻柴胡已上各三錢黄連酒洗一兩黄芩二兩一方加枳實五錢右為細末湯浸􅔻餅為丸如菉豆大毎服五十丸白湯下食逺服治傷冷飲者以五苓散毎服二錢三錢匕加生薑煎服之治傷食兼傷冷飲者煎五苓散送半夏枳术丸治傷冷飲不惡寒者腹中亦不覺寒惟覺悶身重食不化者或小便不利煎去桂五苓散依前斟酌服之𤓰蒂散上部有脉下部無脉其人當吐不吐者死何謂下部無脈此謂木鬱也飲食過飽填塞胷中胷中者太隂之分野經曰氣口反大於人迎三倍食傷太隂故曰木鬱則逹之吐者是也𤓰蔕赤小豆已上各等分右二味為極細末毎服二錢七温漿水調下取吐為度若不至兩手尺脈絶無不宜便用此藥恐損元氣令人胃氣不復若止是胷中窒塞悶亂不通以指探去之如不得吐者以物探去之得吐則已如食不去用此藥吐之解云盛食填塞於胷中為之窒塞兩寸脈當主事兩尺脈不見其理安在胷中有食故以吐出之食者物也物者坤土也是足太隂之號也胷中者肺也為物所填肺者手太隂金也金主殺伐也與坤土俱在於上而旺於天金能尅木故肝木生發之氣伏於地下非木鬱而何吐去上焦隂土之物木得舒暢則鬱結去矣食塞於上脈絶於下若不明天地之道無由達此至理水火者隂陽之徴兆天地之别名也故曰獨陽不生獨隂不長天之用在於地下則萬物生長矣地之用在於天上則萬物收藏矣此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下隂水之源本於天上故曰水出髙源故人五臟主有形之物物者隂也隂者水也右三部脈主之偏見於寸口食塞其上是絶五臟之源源絶則水不下流兩尺竭絶此其理也何疑之有假令所傷前後不同以分為率傷熱物二分傷生冷硬物一分用寒藥三黄丸二停熱藥巴豆三稜丸一停合而服之如熱物傷少而寒物傷多則寒藥少而熱藥多也假令夏月大熱之時傷生冷硬物當用熱藥巴豆三稜丸治之湏加三黄丸謂天時不可伐故加寒藥以順時令若熱物只用三黄丸何謂此三黄丸時藥也假令冬天大寒之時傷羊肉濕麵等熱物當用三黄丸治之須加熱藥少許草豆蔲丸之類是也為引用又為時藥經云必先歲氣無伐天和此之謂也餘皆倣此消渴門消渴論隂陽别論云二陽結謂之消脈要至微論云痺成為消中夫二陽者陽明也手陽明大腸主津病消則目黄口乾是津不足也足陽明胃主血熱則消糓善飢血中伏火乃血不足也結者津液不足結而不潤皆燥熱為病也此因數食丼美而多肥故其氣上溢轉為消渴治之以蘭除陳氣也不可服膏粱芳草石藥其氣慓悍能助燥熱也越人云邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣陽脈大盛則隂氣不得營也故皮膚肌肉消削是也經云凡治消痺仆繫偏枯痿厥氣滿發逆肥貴人則膏之疾也岐伯曰脈實病久可治脈弦小病久不可治後分為三消髙消者舌上赤裂大渴引飲逆調論云心移熱於肺傳於膈消者是也以白虎加人參湯治之中消者善食而痩自汗大便硬小便數叔和云口乾飲水多食飢虚癉成消中者是也以調胃承氣三黄丸治之下消者煩躁引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也以六味地黄丸治之總録所謂末傳能食者必發􅀈疽背瘡不能食者必傳中滿鼓脹皆謂不治之證潔古老人分而治之能食而渴者白虎加人參湯不能食而渴者錢氏方白术散倍加葛根治之上中既平不復傳下消矣前人用藥厥有㫖哉或曰末傳瘡疽者何也此火邪勝也其瘡痛甚而不潰或赤水者是也經云有形而不痛陽之類也急攻其陽無攻其隂治在下焦元氣得强者生失强者死末傳中滿者何也以寒治熱雖方士不能廢其䋲墨而更其道也然臟腑有逺近心肺位近宜制小其服腎肝位逺宜制大其服皆適其至所為當如過與不及皆誅罰無過之地也如髙消中消制之大急速過病所久而成中滿之病正謂上熱未除中寒復生者也非藥之罪失其緩急之制也處方之制宜加意焉和血益氣湯治口乾舌乾小便數舌上赤脈此藥生津液除乾燥生肌肉柴胡炙甘草生甘草此味治口乾舌乾麻黄根已上各三錢酒當歸梢四分酒知母酒漢防己羌活已上各五分石膏六分治小便赤色酒生地黄七分酒黄連八分治舌上赤脉也酒黄蘗升麻已上各一錢杏仁桃仁已上各六箇紅花少許右㕮咀都作一服水二大盞煎至一盞去柤温服忌熱濕麵酒醋等物當歸潤燥湯治消渴大便閉澀乾燥結硬兼喜温飲隂頭退縮舌燥口乾眼澀難開及於黒處見浮雲細辛一分生甘草炙甘草熟地黄已上各三分柴胡七分黄蘗知母石膏桃仁泥子當歸身麻子仁防風荆芥穗已上各一錢升麻一錢五分紅花少許杏仁六箇小椒三箇右㕮咀都作一服水二大盞煎至一盞去柤熱服食逺忌辛熱物生津丼露湯一名清涼飲子治消中能食而痩口舌乾自汗大便結燥小便頻數升麻四分防風生甘草漢防己生地黄各五分當歸身六分柴胡羌活炙甘草黄茋酒知母酒黄芩已上各一錢酒龍膽草石膏黄蘗各一錢五分紅花少許桃仁五箇杏仁十箇右㕮咀都作一服水二盞酒一匙煎至一盞稍熱服食逺辛潤緩肌湯一名清神補氣湯前消渴證纔愈止有口乾腹不能努此藥主之生地黄細辛已上各一分熟地黄三錢石膏四分黄蘗酒製黄連酒製生甘草知母已上各五分柴胡七分當歸身荆芥穗桃仁防風已上各一錢升麻一錢五分紅花少許杏仁六箇小椒二箇右㕮咀都作一服水二大盞煎至一盞食逺稍熱服之甘草石膏湯渴病乆愈又添舌白滑微腫咽喉嚥津覺痛嗌腫時時有渴喜冷飲口中白沬如膠生地黄細辛已上各一分熟地黄黄連已上各三分甘草五分石膏五分柴胡七分黄蘗知毋當歸身桃仁炒去皮尖荆芥穗防風已上各一錢升麻一錢五分紅花少許杏仁六箇花椒二箇右如麻豆大都作一服水二盞煎至一盞食後温服甘露膏一名蘭香飲子治消渴飲水極甚善食而痩自汗大便結燥小便頻數半夏二分酒洗熟甘草白豆蔲仁人參蘭香升麻連翹桔梗已上各五分生甘草防風已上各一錢酒知母一錢五分石膏三錢右為極細末酒浸蒸餅和勻成劑捻作薄片子日中晒半乾擦碎如米大毎服二錢淡生薑湯送下食後生津甘露飲子治消渴上下齒皆麻舌根强硬腫痛食不能下時有腹脹或瀉黄如糜名曰餐泄渾身色黄目晴黄甚四肢痿弱前隂如氷尻臀腰背寒面生黧色脇下急痛善􅅉喜怒健忘藿香二分柴胡黄連木香已上各三分白葵花麥門冬當歸身蘭香已上各五分蓽澄茄生甘草山梔子白豆蔲仁白芷連翹姜黄已上各一錢石膏一錢一分杏仁去皮酒黄蘗各一錢五分炙甘草酒知母升麻人參已上各二錢桔梗三錢全蝎二箇去毒右為細末湯浸􅔻餅和勻成劑捻作片子日中晒半乾擦碎如黄米大毎服二錢津唾下或白湯送下食逺服眼耳鼻門諸脈者皆屬於目論隂陽應象論云諸脈者皆屬於目目得血而能視五臟六腑精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黒眼血之精為絡為窠氣之精為白眼肌肉之精則為約束裹擷筋骨血氣之精而與脈并為系上屬於腦後出於項中故邪中於項因逄其身之虚其入深則即隨眼系入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比也則精散精散則視岐故見兩物目者五臓六腑之精榮衛䰟􅅎之所常營也神氣之所主也故神勞則魂魄散志意亂是故瞳子黒眼發於隂白眼赤脈發於陽故隂陽合傳而為精明也目者心之使也心者神之舎也故神精亂而不轉卒然見非常之處精神魂魄散不相得故曰惑也夫十二經脈三百六十五絡其血氣皆上走於靣而走空竅其精陽氣上散於目而為精其氣走於耳而為聽因心事煩冗飲食失節勞役過度致脾胃虚弱心火大盛則百脈沸騰血脈逆行邪害空竅天明則日月不明矣夫五臟六腑之精氣皆秉受於脾上貫於目脾者諸隂之首也目者血脈之宗也故脾虚則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜静而安相火代行其令相火者包絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所幷而損血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本是不明正理也内障眼論凡心包絡之脈出於心中以代心君之行事也與少陽為表裏瞳子散大者少隂心之脈挾目系厥隂肝之脉連目系心主火肝主木此木火之勢盛也其味則宜苦宜酸宜涼大忌辛辣熱物是瀉木火之邪也飲食中常知此理可也瀉辛主散熱則助火故不可食諸酸主收心氣瀉木火也諸苦瀉火熱則益水也尤忌食冷水大寒之物此則能損胃氣不行則元氣不生元氣不行胃氣下流胷中三焦之火及心火乗於肺上入腦灼髄火主散益瞳子開大大熱之物又助火邪此盖不可食驗也藥中云茺蔚子一味辛及主益睛睛者助火也故去之乃知黄芩黄連瀉中焦之火芩能瀉上焦肺中之火以酒洗之乃寒因熱用也又去青箱子為助陽火也加五味子以收瞳人開大且火之與氣勢不兩立故内經曰壯火食氣氣食少火少火生氣壯火散氣諸酸之物能助元氣孫真人云五月常服五味助五臟氣以補西方肺金法云以酸補之以辛瀉之辛瀉氣則明矣或曰藥中有當歸其味亦辛而甘其不去者何此辛丼一味以其和血之勝藥况有丼味又欲以為鄉𨗳