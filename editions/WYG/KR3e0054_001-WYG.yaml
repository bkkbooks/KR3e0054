水二盞煎至一盞去柤臨卧温服歸葵湯一名連翹飲子治目中溜火惡日與火隠澀難開小角𦂳視物昏花迎風有淚柴胡二分生甘草蔓荆子連翹生地黄當歸身紅葵花人參已上各三分黄茋酒黄芩防風羌活已上各五分升麻一錢右㕮咀毎服五錢水二盞煎至一盞去柤食後温服救苦湯治眼暴發赤腫臉髙苦疼不任者桔梗連翹紅花細辛已上各一錢當歸身夏月減半炙甘草已上各五分蒼术草龍膽已上各七分羌活太陽升麻陽明柴胡少陽防風藁本黄連已上各一錢生地黄黄蘗黄芩知母已上各一錢五分川芎三錢右㕮咀毎服一兩水二盞煎至一盞去柤食後温服若苦疼則多用苦寒者兼治本經之藥再行加減如睛昏加知母黄蘗一倍熟乾地黄丸治血弱隂虚不能著心致心火旺陽火甚瞳子散大少隂為火君主無為不行其令相火代之兼心包絡之脈出心系分為三道少陽相火之體無形其用在其中矣火盛則令母實乙未肝旺是也心之脈挾於目系肝連目系况手足少陽之脉同出耳中至耳上角斜起於目外眥風熱之盛亦從此道而來上攻頭目致偏頭腫門瞳子散大視物則花此目血虚隂弱故也法當養血涼血益血收火之散大除風之熱則愈矣人參二錢炙甘草天門冬湯浸去心地骨皮五味子枳殻炒黄連已上各三錢當歸身酒洗焙乾黄芩已上各五錢生地黄酒洗七錢五分柴胡八錢熟乾地黄一兩右件同為細末煉蜜為丸如梧桐子大毎服一百丸茶湯送下食進二服益隂腎氣丸此壯水之主以鎮陽光澤瀉茯神已上各二錢五分生地黄酒洗乾牡丹皮山茱萸當歸梢酒洗五味子乾山藥柴胡已上各五錢熟地黄二兩右為細末煉蜜為丸如梧桐子大硃砂為衣毎服五十丸淡鹽湯下空心羗活退瞖丸治内障右眼小眥青白瞖大眥皆微顯白瞖腦痛瞳子散大上熱惡熱大便閉澀小便如常遇天氣暄熱頭痛睛脹可服此藥瞖在大眥加葛根升麻瞖在小眥加柴胡羗活是也黑附子炮寒水石已上各一錢酒防己二錢知母酒炒牡丹皮羌活川芎已上各三錢酒黄蘗生地黄酒洗炒丹參茺蔚子酒當歸身柴胡已上各五錢熟地黄八錢芍藥一兩三錢右為細末煉蜜為丸如梧桐子大毎服五七十丸白湯下空心宿食未消待飢則服之藥後省語言以食壓之當歸龍膽湯治眼中白瞖防風石膏已上各一錢五分柴胡羌活五味子升麻已上各二錢甘草酒黄連黄茋已上各三錢酒黄芩炒酒黄蘗炒當歸身酒洗草龍膽酒洗芍藥已上各五錢右㕮咀毎服五錢水二盞煎至一盞去柤入酒少許臨卧熱服忌言語補陽湯治陽不勝其隂乃隂盛陽虚則九竅不通令青白瞖見於大眥及足太陽少隂經中鬱遏足厥隂肝經氣不得上通於目故青白瞖内阻也當於太陽少隂經中九原之下以益肝中陽氣衝天上行此乃先補其陽後於足太陽太隂標中標者頭也瀉足厥隂肝經火下伏於陽中乃次治也内經云隂盛陽虚則當先補其陽後瀉其隂此治法是也毎日清晨以腹中無宿食服補陽湯臨卧服瀉隂丸若天色變經大寒大風并勞役預日飲食不調精神不足或氣弱俱不可服待體氣和平天氣如常服之先補其陽使陽氣上升通於肝經之末利空竅於目矣肉桂一錢去皮知母炒當歸身酒洗生地黄酒炒白茯苓澤瀉陳皮已上各三錢白芍藥防風已上各五錢黄茋人參白术羌活獨活熟地黄甘草已上各一兩柴胡二兩右㕮咀毎服五錢水二盞煎至一大盞去柤空心服之瀉隂火丸一名連蘗益隂丸石決明三錢炒存性羌活獨活甘草當歸梢五味子防風已上各五錢草決明細黄芩黄連酒炒黄蘗知母已上各一兩右為細末煉蜜為丸如菉豆大毎服五十丸至一百丸茶清下常多服補陽湯少服此藥多則妨飲食升陽柴胡湯肉桂五分柴胡去苖一錢五分知母酒炒如火者加作五錢防風白茯苓澤瀉陳皮已上各三錢生地黄酒炒楮實酒炒微潤黄茋人參白术已上各五錢甘草梢當歸身羌活熟地黄獨活白芍藥已上各一兩右剉毎服五錢水二盞煎至一盞去柤稍熱食逺服别合一料煉蜜為丸如梧桐子大毎服五十丸茶清下毎日與前藥各一服食逺不可飽服如天氣熱加五味子三錢天門冬去心芍藥楮實已上各五錢温衛湯治鼻不聞香臭月中流火氣無熱冷淚多臍下冷隂汗足痿弱陳皮青皮黄連木香已上各三分人參甘草炙白芷防風黄蘗澤瀉已上各五分黄茋蒼术升麻知母柴胡羌活已上各一錢當歸身一錢五分右都作一服水二盞煎至一盞去柤食逺服之圓明膏治勞心過度飲食失節乃生内障及瞳子散大此方收睛圓明訶子皮濕紙裹煨甘草已上各二錢當歸身三錢柴胡生地黄麻黄去節搗開黄連已上各五錢右七味先以水二椀煎麻黄至一椀掠去沫外六味各㕮咀如豆大篩去末入在内同熬滴水中不散為度入熟蜜少許再熬勤㸃眼㗜藥麻黄散治内外障眼麻黄一兩當歸身一錢右二味同為麤末炒黑色入麝香乳香少許共為細末含水鼻内㗜之療本滋腎丸黄蘗酒炒知母酒炒已上各等分右為細末滴水為丸如梧桐子大毎服一百丸至一百五十丸空心鹽白湯下加味滋腎丸肉桂三分黄連一錢薑黄一錢五分苦參三錢苦葶􅐗酒洗炒石膏覺肚冷勿用黄蘗酒炒知母酒炒已上各五錢右為極細末打薄麵糊為丸如梧桐子大毎服一百丸空心服白湯下食壓之退瞖膏治黑白瞖㽔仁升麻已上各三分連翹防風青皮已上各四分甘草柴胡已上各五分當歸身六分荆芥穗一錢水半盞别浸生地黄一錢五分黄連三錢右用水一椀入前藥煎至半椀去柤更上火煎至半盞入荆芥水兩匙入蜜少許再上火熬匀㸃之龍膽飲子治疳眼流膿生肝瞖濕熱為病糓精草川鬱金蛇退皮炙甘草已上各五分麻黄一錢五分升麻二錢青蛤粉草龍膽黄芩炒羌活已上各三錢右為細末毎服二錢食後温茶清調服之柴胡聰耳湯治耳中乾結耳鳴耳聾連翹四錢柴胡三錢炙甘草當歸身人參已上各一錢水蛭五分炒别研麝香少許另研䖟蟲三箇去翅足炒另研右除三味别研外生薑三片水二大盞煎至一盞去柤再下三味上火煎一二沸稍熱服食逺羌活退瞖湯治太陽寒水瞖膜遮睛不能視物羌活一兩五錢防風一兩荆芥穗煎成藥加之薄荷葉藁本各七錢酒知母五錢黄蘗四錢川芎當歸身已上各三錢小椒五分酒生地黄一錢細辛少許麻黄二錢用根右㕮咀毎服三錢水二大盞煎至一盞半入荆芥穗再煎至一盞去柤稍熱服食逺忌酒醋濕麵等物還睛紫金丹治目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目眶外以瀉濕熱如眼生倒睫拳毛兩目𦂳盖内伏火熱而攻隂氣法當去其熱内火邪眼皮緩則毛立出瞖膜亦退用手法攀出内臉向外以針刺之出血白沙蜜二十兩甘石十兩燒七遍碎連水浸拌之黄丹六兩水飛揀連三兩小便浸碎為末南乳香當歸已上各三錢烏魚骨二錢硇砂小盞内放於瓶口上熏乾麝香已上各一錢白丁香真者五分輕粉一錠右將白沙蜜於沙石器内慢火去沫下甘石次下丹以柳枝攪次下餘藥以粘手為度作丸如鷄頭大毎用一丸温水化開洗麗澤通氣湯治鼻不聞香臭黄茋四錢蒼术羌活獨活防風升麻葛根已上各三錢炙甘草二錢麻黄不去節冬月加之川椒白芷已上各一錢右㕮咀毎服五錢生薑三片棗二枚葱白三寸同煎至一盞去柤温服食逺忌一切冷物及風寒凉處坐卧行立温肺湯治鼻不聞香臭眼多眵淚丁香三分防風炙甘草葛根羌活已上各一錢升麻黄茋已上各二錢麻黄不去節四錢右為麤末水二盞蔥白三根煎至一盞去柤食後服禦寒湯治寒氣風邪傷於皮毛令鼻壅寒咳𠻳上喘之證黄連黄蘗𦍑活已上各二分炙甘草佛耳草欵冬花白芷防風已上各三分升麻人參陳皮已上各五分蒼术七分黄茋一錢右㕮咀都作一服水二盞煎至一盞去柤食後熱服蘭室秘藏卷上
